name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run unit tests
        run: go test ./internal/... -count=1 -timeout 60s

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run integration tests (cgroup — requires root)
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" go test -tags=integration ./internal/... -count=1 -timeout 120s -v

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install BPF build dependencies
        # Only clang + libbpf-dev needed — vmlinux.h is pre-committed to the repo,
        # so bpftool is not required to regenerate it.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev make

      - name: Generate BPF objects (bpf2go)
        run: |
          set -euo pipefail
          echo "Kernel: $(uname -r)"
          make generate

      - name: Build leashd and connector
        run: make build testbin

      - name: Smoke test — verify leashd binary starts and loads BPF
        run: |
          set -euo pipefail
          SMOKE_DIR=$(mktemp -d)
          cat > "$SMOKE_DIR/rules.yaml" <<'EOF'
          version: "1"
          project:
            name: smoke-test
          defaults:
            action: warn
            log: true
          EOF
          echo "=== leashd smoke test ==="
          sudo env PATH="$PATH" bin/leashd run --no-daemon --dir "$SMOKE_DIR" echo "BPF-less start OK" 2>&1
          echo "=== BPF load test ==="
          sudo env PATH="$PATH" bin/leashd run --dir "$SMOKE_DIR" echo "BPF load OK" 2>&1 || {
            echo "FAIL: leashd BPF load failed (see stderr above)"; exit 1
          }

      - name: Run E2E tests
        run: |
          sudo env \
            PATH="$PATH" \
            GOPATH="$GOPATH" \
            HOME="$HOME" \
            LEASHD_BIN="$(pwd)/bin/leashd" \
            CONNECTOR_BIN="$(pwd)/tests/e2e/helpers/connector/connector" \
            make test-e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
