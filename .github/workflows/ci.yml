name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run unit tests
        run: go test ./internal/... -count=1 -timeout 60s

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run integration tests (cgroup — requires root)
        # Cgroup tests don't need BPF compilation; stub objects.go is sufficient.
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" go test -tags=integration ./internal/... -count=1 -timeout 120s -v

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install clang / libbpf
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev make

      - name: Install bpftool (standalone binary)
        run: |
          # Use the standalone bpftool release from the libbpf project — avoids
          # kernel-package version skew on GitHub Actions Azure-kernel runners.
          set -euo pipefail
          BPFTOOL_TAG=$(curl -fsSL \
            "https://api.github.com/repos/libbpf/bpftool/releases/latest" \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Installing bpftool ${BPFTOOL_TAG}"
          curl -fsSL \
            "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_TAG}/bpftool-${BPFTOOL_TAG}-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin bpftool
          sudo chmod 0755 /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h and BPF objects
        run: |
          set -euo pipefail
          echo "Kernel: $(uname -r)"
          ls -la /sys/kernel/btf/vmlinux
          make vmlinux
          make generate

      - name: Build leashd and connector
        run: make build testbin

      - name: Run E2E tests
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" make test-e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
