name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run unit tests
        run: go test ./internal/... -count=1 -timeout 60s

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run integration tests (cgroup — requires root)
        # The integration tests only exercise cgroup management, not BPF compilation.
        # No generate step needed; the stub objects.go is sufficient for compilation.
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" go test -tags=integration ./internal/... -count=1 -timeout 120s -v

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install BPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev make
          # Install bpftool from the kernel tools package matching the running kernel.
          sudo apt-get install -y --no-install-recommends linux-tools-$(uname -r) || \
            sudo apt-get install -y --no-install-recommends linux-tools-generic || true
          # Ensure bpftool is accessible.
          BPFTOOL=$(find /usr/lib/linux-tools* -name bpftool 2>/dev/null | head -1)
          if [ -n "$BPFTOOL" ]; then sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool; fi
          bpftool version || echo "bpftool not available — vmlinux.h will be skipped"
      - name: Generate vmlinux.h and BPF objects
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            make vmlinux
            make generate
          else
            echo "BTF not available on this runner — skipping eBPF compilation"
            echo "E2E tests will be skipped"
            echo "SKIP_E2E=1" >> "$GITHUB_ENV"
          fi
      - name: Build leashd and connector
        if: env.SKIP_E2E != '1'
        run: make build testbin
      - name: Run E2E tests
        if: env.SKIP_E2E != '1'
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" make test-e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
