name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run unit tests
        run: go test ./internal/... -count=1 -timeout 60s

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install BPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm linux-tools-generic libbpf-dev make
          BPFTOOL=$(find /usr/lib/linux-tools* -name bpftool 2>/dev/null | head -1)
          if [ -n "$BPFTOOL" ]; then sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool; fi
          go install github.com/cilium/ebpf/cmd/bpf2go@latest
      - name: Generate vmlinux.h and BPF objects
        run: make vmlinux && make generate
      - name: Run integration tests
        run: sudo go test -tags=integration ./internal/... -count=1 -timeout 120s -v

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install BPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm linux-tools-generic libbpf-dev make
          BPFTOOL=$(find /usr/lib/linux-tools* -name bpftool 2>/dev/null | head -1)
          if [ -n "$BPFTOOL" ]; then sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool; fi
          go install github.com/cilium/ebpf/cmd/bpf2go@latest
      - name: Build leashd and connector
        run: make build testbin
      - name: Run E2E tests
        run: sudo make test-e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
