name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run unit tests
        run: go test ./internal/... -count=1 -timeout 60s

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run integration tests (cgroup — requires root)
        # Cgroup tests don't need BPF compilation; stub objects.go is sufficient.
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" go test -tags=integration ./internal/... -count=1 -timeout 120s -v

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install clang / libbpf / bpftool
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev make \
            linux-tools-common linux-tools-generic
          # linux-tools-generic places the actual ELF binary under a versioned dir.
          # The /usr/sbin/bpftool wrapper only works if the running kernel matches;
          # on Azure runners (5.x-azure) that kernel package is absent.
          # So we find the real binary and put it directly on PATH.
          BPFTOOL=$(find /usr/lib/linux-tools -name bpftool ! -type l 2>/dev/null \
                    | sort -V | tail -1)
          if [ -z "$BPFTOOL" ]; then
            echo "ERROR: bpftool binary not found after install" >&2
            exit 1
          fi
          sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h and BPF objects
        run: |
          set -euo pipefail
          echo "Kernel: $(uname -r)"
          ls -la /sys/kernel/btf/vmlinux
          make vmlinux
          make generate

      - name: Build leashd and connector
        run: make build testbin

      - name: Run E2E tests
        run: sudo env PATH="$PATH" GOPATH="$GOPATH" HOME="$HOME" make test-e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
